[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance tests
    benchmark: marks tests as benchmark tests
    e2e: marks tests as end-to-end tests
    api: marks tests as API tests
    rag: marks tests as RAG pipeline tests
    document: marks tests as document processing tests

# Async mode
asyncio_mode = auto

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Coverage (when running with --cov)
# Use: pytest --cov=app --cov-report=html --cov-report=term-missing

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Timeouts (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum Python version
minversion = 3.9
