# Development Docker Compose for Smart Legal Contracts
# Usage: docker-compose up -d
# For hot reload: volumes mount local code into containers

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: slc-dev-postgres
    environment:
      POSTGRES_DB: smartlegal_dev
      POSTGRES_USER: smartlegal
      POSTGRES_PASSWORD: devpassword
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlegal -d smartlegal_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slc-dev-network

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: slc-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slc-dev-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: slc-dev-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slc-dev-network

  # FastAPI Backend with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: slc-dev-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_dev_cache:/root/.cache
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql://smartlegal:devpassword@postgres:5432/smartlegal_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      USE_QDRANT: "true"
      SECRET_KEY: dev-secret-key-not-for-production
      JWT_SECRET: dev-jwt-secret-not-for-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000
      ENABLE_DOCS: "true"
      ENABLE_METRICS: "true"
      LOG_LEVEL: DEBUG
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - slc-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Celery Worker for async tasks (dev mode)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: slc-dev-celery-worker
    command: celery -A app.worker.celery_app worker --loglevel=debug
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://smartlegal:devpassword@postgres:5432/smartlegal_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      USE_QDRANT: "true"
      SECRET_KEY: dev-secret-key-not-for-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: DEBUG
    depends_on:
      - postgres
      - redis
      - qdrant
    networks:
      - slc-dev-network

  # Next.js Frontend with hot reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: slc-dev-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    networks:
      - slc-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  qdrant_dev_data:
    driver: local
  backend_dev_cache:
    driver: local

networks:
  slc-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16